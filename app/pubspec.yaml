name: vibetasking
description: "VibeTasKing - AI-Powered Task Manager | Copyright (c) 2026 lanniny"
publish_to: 'none'
version: 1.1.0+1
homepage: https://github.com/lanniny/vibetasking

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1

  # 状态管理
  flutter_bloc: ^9.1.0
  equatable: ^2.0.7

  # 数据库
  drift: ^2.27.0
  sqlite3_flutter_libs: ^0.5.32
  path_provider: ^2.1.5
  path: ^1.9.1

  # 网络 & AI
  http: ^1.4.0
  dart_openai: ^5.1.0

  # Markdown
  flutter_markdown: ^0.7.7

  # 图表
  fl_chart: ^0.70.2

  # 工具
  uuid: ^4.5.1
  intl: ^0.20.2
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.27.0
  build_runner: ^2.4.15
  json_serializable: ^6.9.5

flutter:
  uses-material-design: true
